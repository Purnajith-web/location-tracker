<!DOCTYPE html>
<html>
  <head>
    <title>Location Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      function sendLocation(position) {
        const data = {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude
        };

        fetch('https://script.google.com/macros/s/AKfycbxDcNHWBtvKgBQ1UQl9ghOHlzDqPW-Qvboi2-5Ic_d3XbzoPem7ti4v98L9QodhVfz7/exec', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        })
        .then(response => response.text())
        .then(result => {
          document.getElementById("status").innerText = "Location sent successfully!";
        })
        .catch(error => {
          document.getElementById("status").innerText = "Error sending location.";
          console.error(error);
        });
      }

      function getLocationAndSend() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(sendLocation, function(error) {
            document.getElementById("status").innerText = "Location access denied.";
          });
        } else {
          document.getElementById("status").innerText = "Geolocation not supported.";
        }
      }

      window.onload = getLocationAndSend;
    </script>
  </head>
  <body>
    <h2>Tracking Your Location...</h2>
    <p id="status">Waiting for permission...</p>
  </body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Live GPS Tracker</title>
</head>
<body>
  <h1>Tracking...</h1>
  <p id="status">Waiting for location...</p>

  <!-- Firebase SDKs from CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

  <script>
    // ✅ Your Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA4YgvaZTl2af1U74chmPcp69_itb8jgVc",
      authDomain: "locationtracker-5df11.firebaseapp.com",
      databaseURL: "https://locationtracker-5df11-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "locationtracker-5df11",
      storageBucket: "locationtracker-5df11.appspot.com",
      messagingSenderId: "601939519444",
      appId: "1:601939519444:web:366d6f583541ed435ed841"
    };

    // ✅ Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const device = navigator.userAgent;
    const userId = "user_" + Math.floor(Math.random() * 10000);

    function sendLocation(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const timestamp = new Date().toISOString();

      const data = {
        latitude: lat,
        longitude: lng,
        timestamp: timestamp,
        device: device,
        userId: userId
      };

      db.ref("locations").push(data);

      document.getElementById("status").innerText = 
        `✅ Sent: ${lat}, ${lng}`;
    }

    function handleError(err) {
      document.getElementById("status").innerText = `❌ Error: ${err.message}`;
    }

    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(sendLocation, handleError, {
        enableHighAccuracy: true,
        maximumAge: 5000,
        timeout: 10000
      });
    } else {
      document.getElementById("status").innerText = 
        "❌ Geolocation not supported.";
    }
  </script>
</body>
</html>

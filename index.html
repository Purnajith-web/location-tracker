<!DOCTYPE html>
<html>
<head>
  <title>Location Tracker</title>
</head>
<body>
  <h1>Live Location Tracker</h1>
  <p id="status">Requesting location...</p>

  <script>
    function sendLocation(lat, lon) {
      console.log("Sending location to Google Sheet:", lat, lon);

      fetch('https://script.google.com/macros/s/AKfycbxDcNHWBtvKgBQ1UQl9ghOHlzDqPW-Qvboi2-5Ic_d3XbzoPem7ti4v98L9QodhVfz7/exec', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          latitude: lat,
          longitude: lon
        })
      });
    }

    function success(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      document.getElementById('status').innerText = `Latitude: ${lat}, Longitude: ${lon}`;
      sendLocation(lat, lon);
    }

    function error(err) {
      document.getElementById('status').innerText = 'Error getting location: ' + err.message;
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(success, error);
    } else {
      document.getElementById('status').innerText = 'Geolocation not supported by this browser.';
    }
  </script>
</body>
</html>
